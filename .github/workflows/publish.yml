name: Publish to npm

on:
  push:
    tags: ["v*"]

# Trusted publishing: the job mints a short-lived OIDC token instead of using a
# long-lived NPM_TOKEN. `id-token: write` is required to request it.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Publish-only: main is already pristine (lefthook pre-commit + PR flow),
    # so this path never re-tests — it builds and publishes. Timeout guards
    # against a hung step (a stuck Playwright install once burned 6h here).
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24: trusted publishing needs npm >= 11.5.1 for the OIDC
          # handshake. Node 22 bundles npm 10, whose handshake fails silently —
          # the registry then treats the publish as anonymous and returns a
          # misleading 404 on PUT. pnpm delegates to the system npm, so this
          # version is what matters. (Stay on pnpm 10.x; pnpm 11 has its own
          # OIDC regression, pnpm#11513.)
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      # No NODE_AUTH_TOKEN: pnpm fetches an OIDC token via the id-token
      # permission above, which takes precedence over a static token.
      # Requires a trusted publisher registered on npmjs.com for this repo +
      # workflow (villetakanen/lys → publish.yml). --provenance attaches a
      # supply-chain attestation to the published package.
      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks --provenance
